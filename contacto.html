<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto | Diana Duque Web</title>

  <meta name="description" content="Contacto de Diana Duque Web - Arcanet X. Colaboraciones, proyectos tecnológicos y comunicación directa.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b0f2a, #000);
      color: white;
    }

    /* 🌐 NAV GLOBAL */
    nav {
      display: flex;
      justify-content: center;
      gap: 15px;
      padding: 15px;
      background: rgba(17, 24, 43, 0.9);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    nav a {
      color: #00e5ff;
      text-decoration: none;
      font-weight: bold;
      padding: 8px 12px;
      border-radius: 10px;
    }

    nav a:hover {
      background: rgba(0,229,255,0.15);
    }

    header {
      text-align: center;
      padding: 30px 20px;
    }

    h1 {
      color: #ff4df3;
      text-shadow: 0 0 10px #ff4df3;
    }

    p {
      color: #bbb;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,255,0.25);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,255,255,0.15);
    }

    label {
      display: block;
      margin-top: 10px;
      color: #ccc;
      font-size: 0.9em;
    }

    input, textarea {
      width: 100%;
      margin-top: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #11182b;
      color: white;
    }

    textarea {
      min-height: 120px;
    }

    .btn {
      margin-top: 15px;
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: bold;
      color: black;
      background: linear-gradient(90deg, #ff00cc, #00e5ff);
      box-shadow: 0 0 12px #ff00cc;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .info {
      margin-top: 20px;
      font-size: 0.9em;
      color: #aaa;
      line-height: 1.6;
    }

    .links {
      margin-top: 20px;
      text-align: center;
    }

    .links a {
      display: inline-block;
      margin: 6px;
      padding: 8px 12px;
      border-radius: 10px;
      color: #00e5ff;
      text-decoration: none;
      border: 1px solid rgba(0,229,255,0.3);
    }

    footer {
      text-align: center;
      padding: 25px;
      color: #666;
    }
  </style>
</head>

<body>

  <!-- 🌐 NAV -->
  <nav>
    <a href="index.html">🏠 Inicio</a>
    <a href="libros.html">📚 Libros</a>
    <a href="contacto.html">📡 Contacto</a>
  </nav>

  <header>
    <h1>📡 Contacto</h1>
    <p>Arcanet X — comunicación directa y colaboraciones</p>
  </header>

  <div class="container">

    <div class="card">

      <p class="info">
        Este espacio está destinado a colaboraciones, proyectos tecnológicos,
        desarrollo web y propuestas creativas dentro del entorno Arcanet X.
      </p>

      <form>
        <label>Nombre</label>
        <input type="text" placeholder="Tu nombre">

        <label>Email</label>
        <input type="email" placeholder="tuemail@email.com">

        <label>Mensaje</label>
        <textarea placeholder="Escribe tu mensaje..."></textarea>

        <button class="btn" type="button">Enviar</button>
      </form>

      <div class="links">
        <a href="index.html">🏠 Inicio</a>
        <a href="libros.html">📚 Libros</a>
      </div>

    </div>

  </div>

  <footer>
    © 2026 Diana Duque Web — Arcanet X
  </footer>

</body>
</html>
