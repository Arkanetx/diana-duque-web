<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contacto | Diana Duque Web</title>

  <meta name="description" content="Página de contacto de Diana Duque Web - Arcanet X. Colaboraciones, proyectos y comunicación directa.">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #0b0f2a, #000);
      color: white;
    }

    /* 🌌 fondo espacial simple */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: transparent;
      z-index: 0;
      pointer-events: none;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      position: relative;
      z-index: 1;
    }

    h1 {
      color: #ff4df3;
      text-shadow: 0 0 10px #ff4df3;
    }

    p {
      color: #bbb;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(0,255,255,0.25);
      border-radius: 15px;
      padding: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 0 15px rgba(0,255,255,0.15);
    }

    label {
      display: block;
      margin-top: 10px;
      color: #ccc;
      font-size: 0.9em;
    }

    input, textarea {
      width: 100%;
      margin-top: 5px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
      background: #11182b;
      color: white;
    }

    textarea {
      min-height: 120px;
      resize: none;
    }

    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 10px 18px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
      color: black;
      background: linear-gradient(90deg, #ff00cc, #00e5ff);
      box-shadow: 0 0 12px #ff00cc;
      border: none;
      cursor: pointer;
    }

    .btn:hover {
      transform: scale(1.05);
      transition: 0.2s;
    }

    .links {
      margin-top: 20px;
      text-align: center;
    }

    .links a {
      color: #00e5ff;
      text-decoration: none;
      display: block;
      margin: 8px 0;
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #666;
      position: relative;
      z-index: 1;
    }
  </style>
</head>

<body>

  <header>
    <h1>📡 Contacto</h1>
    <p>Arcanet X — comunicación directa</p>
  </header>

  <div class="container">

    <div class="card">

      <form>
        <label>Nombre</label>
        <input type="text" placeholder="Tu nombre">

        <label>Email</label>
        <input type="email" placeholder="tuemail@email.com">

        <label>Mensaje</label>
        <textarea placeholder="Escribe tu mensaje..."></textarea>

        <button class="btn" type="button">Enviar</button>
      </form>

      <div class="links">
        <a href="index.html">🏠 Volver al inicio</a>
        <a href="libros.html">📚 Ver libros</a>
      </div>

    </div>

  </div>

  <footer>
    © 2026 Diana Duque Web — Arcanet X
  </footer>

</body>
</html>
